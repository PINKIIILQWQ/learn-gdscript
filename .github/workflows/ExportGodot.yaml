name: "Export Godot"

on:
  workflow_dispatch:
  push:
    branches:
      - release
      - staging

env:
  BUILD_GIT_COMMIT: ${{ github.sha }}
  BUILD_GIT_BRANCH: ${{ github.ref_name }}

permissions:
  contents: write

jobs:
  setup:
    name: Setup environment
    runs-on: ubuntu-latest
    container: registry.gitlab.com/greenfox/godot-build-automation:latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Python 3
        run: apt-get update && apt-get install -y --no-install-recommends python3

      - name: Prepare CI
        run: python3 build.py prepare ci

      - name: Upload prepared source
        uses: actions/upload-artifact@v4
        with:
          name: prepared-source
          path: |
            .
            !.git
          retention-days: 1
          include-hidden-files: true

  export:
    name: Export web
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/download-artifact@v4
        with:
          name: prepared-source

      - name: Setup environment
        run: |
          chmod +x godot_server.x86_64
          chmod +x butler || true
          echo "$PWD" >> $GITHUB_PATH
          echo "GODOT_TEMPLATES_DIR=$PWD/templates" >> $GITHUB_ENV

      - name: Export for web
        run: python3 build.py export web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web
          retention-days: 90

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: build/web/${{ github.ref_name }}
          target-folder: ''
          clean: false
